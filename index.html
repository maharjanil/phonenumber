<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Directory</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --bg-color: #1a1d29;
            --card-bg: #24283b;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --success-color: #10b981;
            --success-hover: #059669;
            --border-color: #2d3748;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
        }

        .main-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 15px;
        }

        .page-title {
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            margin-bottom: 24px;
            overflow: hidden;
        }

        .card-header {
            background-color: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            font-size: 1.05rem;
            padding: 16px 24px;
            color: var(--text-primary);
        }

        .form-control {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 10px;
            padding: 12px 16px;
            transition: all 0.2s ease;
        }

        .form-control::placeholder { color: var(--text-secondary); }
        .form-control:focus {
            background-color: var(--bg-color);
            border-color: var(--accent-color);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .form-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-hover) 100%);
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            font-weight: 600;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--accent-hover) 0%, #4338ca 100%);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
            color: white;
        }

        .btn-outline-primary {
            border: 1px dashed var(--accent-color);
            color: var(--accent-color);
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-outline-primary:hover {
            background-color: rgba(99, 102, 241, 0.1);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success-color) 0%, var(--success-hover) 100%);
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            font-weight: 600;
        }
        .btn-success:hover {
            background: linear-gradient(135deg, var(--success-hover) 0%, #047857 100%);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
            color: white;
        }

        .table { color: var(--text-primary); margin-bottom: 0; }
        .table th {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
            padding: 16px;
        }
        .table td {
            border-bottom: 1px solid var(--border-color);
            padding: 16px;
            vertical-align: middle;
        }
        .table-hover tbody tr:hover { background-color: rgba(255, 255, 255, 0.03); }

        .badge-phone {
            background-color: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.3);
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 6px;
        }

        .loading-spinner { display: none; }
        .collapse { transition: height 0.3s ease; }
    </style>
</head>
<body>

<div class="container main-container">
    <h2 class="text-center page-title"><i class="bi bi-telephone-fill me-2"></i>Phone Directory</h2>

    <!-- Search Section -->
    <div class="card">
        <div class="card-header d-flex align-items-center">
            <i class="bi bi-search me-2"></i> Search Contacts
        </div>
        <div class="card-body p-4">
            <div class="input-group mb-3">
                <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Type a name or phone number to search...">
                <button class="btn btn-primary" type="button" onclick="searchData()">
                    <span class="spinner-border spinner-border-sm loading-spinner me-2" id="searchSpinner" role="status"></span>
                    Search
                </button>
            </div>
            
            <!-- Default Empty State -->
            <div id="searchResults">
                <p class="text-secondary text-center py-3">
                    <i class="bi bi-search me-2"></i>Please enter a name or phone number above to search.
                </p>
            </div>
        </div>
    </div>

    <!-- Toggle Button for Add Section -->
    <button class="btn btn-outline-primary w-100 mb-3 d-flex align-items-center justify-content-center" 
            type="button" 
            data-bs-toggle="collapse" 
            data-bs-target="#addContactCollapse" 
            aria-expanded="false" 
            aria-controls="addContactCollapse"
            onclick="toggleAddIcon(this)">
        <i class="bi bi-plus-circle me-2 fs-5"></i> 
        <span>Add New Contact</span>
    </button>

    <!-- Add New Contact Section (Hidden by default) -->
    <div class="collapse" id="addContactCollapse">
        <div class="card">
            <div class="card-header d-flex align-items-center text-success">
                <i class="bi bi-person-plus-fill me-2"></i> Add New Contact
            </div>
            <div class="card-body p-4">
                <form id="addForm" onsubmit="addData(event)">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="newName" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="newName" placeholder="e.g. John Doe" required>
                        </div>
                        <div class="col-md-6">
                            <label for="newPhone" class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" id="newPhone" placeholder="e.g. +1 234 567 890" required>
                        </div>
                        <div class="col-12">
                            <label for="newNotes" class="form-label">Notes <span class="text-secondary fw-normal">(Optional)</span></label>
                            <input type="text" class="form-control" id="newNotes" placeholder="e.g. Office, Home, Emergency">
                        </div>
                        <div class="col-12 text-end mt-4">
                            <button type="button" class="btn btn-secondary me-2" data-bs-toggle="collapse" data-bs-target="#addContactCollapse">Cancel</button>
                            <button type="submit" class="btn btn-success" id="addBtn">
                                <span class="spinner-border spinner-border-sm loading-spinner me-2" id="addSpinner" role="status"></span>
                                <i class="bi bi-save me-1"></i> Save Contact
                            </button>
                        </div>
                    </div>
                </form>
                <div id="addMessage" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // ⚠️ REPLACE THIS WITH YOUR DEPLOYED GOOGLE APPS SCRIPT WEB APP URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwkAgugklwBOMe6IbQZlLECVwQaRXZeoNdmhnC3Pe9YjurCswD6KW6Ggp--cVZVpnrZ/exec";

    // Toggle icon animation for the Add button
    function toggleAddIcon(btn) {
        const icon = btn.querySelector('i');
        setTimeout(() => {
            if (btn.getAttribute('aria-expanded') === 'true') {
                icon.classList.remove('bi-plus-circle');
                icon.classList.add('bi-dash-circle');
            } else {
                icon.classList.remove('bi-dash-circle');
                icon.classList.add('bi-plus-circle');
            }
        }, 50);
    }

    // Search Data
    async function searchData() {
        const query = document.getElementById('searchInput').value.trim();
        const resultsDiv = document.getElementById('searchResults');
        const spinner = document.getElementById('searchSpinner');

        // If empty, show default message and DO NOT fetch data
        if (!query) {
            resultsDiv.innerHTML = `
                <p class="text-secondary text-center py-3">
                    <i class="bi bi-search me-2"></i>Please enter a name or phone number above to search.
                </p>`;
            return;
        }

        // Show loading spinner
        spinner.style.display = 'inline-block';
        resultsDiv.innerHTML = ''; 

        try {
            const response = await fetch(`${GAS_URL}?action=search&query=${encodeURIComponent(query)}`);
            const data = await response.json();
            spinner.style.display = 'none';

            if (data.success && data.results.length > 0) {
                let html = `
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Phone</th>
                                    <th>Notes</th>
                                    <th>Date Added</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                
                data.results.forEach(row => {
                    const dateStr = row.date ? new Date(row.date).toLocaleDateString() : 'N/A';
                    html += `
                        <tr>
                            <td class="fw-semibold">${row.name}</td>
                            <td><span class="badge-phone">${row.phone}</span></td>
                            <td class="text-secondary">${row.notes || '<span class="fst-italic">No notes</span>'}</td>
                            <td class="text-secondary small">${dateStr}</td>
                        </tr>
                    `;
                });
                
                html += `</tbody></table></div>`;
                
                // Show count of results
                html = `<p class="text-secondary mb-2 small"><i class="bi bi-list-ul me-1"></i> Found ${data.results.length} contact(s)</p>` + html;
                
                resultsDiv.innerHTML = html;
            } else {
                resultsDiv.innerHTML = `<p class="text-secondary text-center py-3"><i class="bi bi-inbox me-2"></i>No contacts found matching "${query}".</p>`;
            }
        } catch (error) {
            spinner.style.display = 'none';
            resultsDiv.innerHTML = '<p class="text-danger text-center py-3"><i class="bi bi-exclamation-triangle me-2"></i>Error fetching data. Please check your GAS URL.</p>';
            console.error(error);
        }
    }

    // Add Data
    async function addData(event) {
        event.preventDefault();
        
        const name = document.getElementById('newName').value.trim();
        const phone = document.getElementById('newPhone').value.trim();
        const notes = document.getElementById('newNotes').value.trim();
        const addBtn = document.getElementById('addBtn');
        const spinner = document.getElementById('addSpinner');
        const messageDiv = document.getElementById('addMessage');

        spinner.style.display = 'inline-block';
        addBtn.disabled = true;
        messageDiv.innerHTML = '';

        const payload = { action: "add", name: name, phone: phone, notes: notes };

        try {
            const response = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            
            const data = await response.json();
            spinner.style.display = 'none';
            addBtn.disabled = false;

            if (data.success) {
                messageDiv.innerHTML = `<div class="alert alert-success d-flex align-items-center" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i> ${data.message}
                </div>`;
                document.getElementById('addForm').reset();
                
                // Hide the form after 2 seconds
                setTimeout(() => { 
                    messageDiv.innerHTML = ''; 
                    const collapseEl = document.getElementById('addContactCollapse');
                    const bsCollapse = new bootstrap.Collapse(collapseEl, { toggle: false });
                    bsCollapse.hide();
                }, 2000);
            } else {
                messageDiv.innerHTML = `<div class="alert alert-danger d-flex align-items-center" role="alert">
                    <i class="bi bi-exclamation-circle-fill me-2"></i> Error: ${data.error}
                </div>`;
            }
        } catch (error) {
            spinner.style.display = 'none';
            addBtn.disabled = false;
            messageDiv.innerHTML = `<div class="alert alert-danger d-flex align-items-center" role="alert">
                <i class="bi bi-exclamation-circle-fill me-2"></i> Failed to save. Check console for details.
            </div>`;
            console.error(error);
        }
    }

    // Allow pressing "Enter" to search
    document.getElementById('searchInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            searchData();
        }
    });
    
    // Optional: Clear results if user manually deletes all text in the search bar
    document.getElementById('searchInput').addEventListener('input', function (e) {
        if (e.target.value.trim() === "") {
            document.getElementById('searchResults').innerHTML = `
                <p class="text-secondary text-center py-3">
                    <i class="bi bi-search me-2"></i>Please enter a name or phone number above to search.
                </p>`;
        }
    });
</script>

</body>
</html>
